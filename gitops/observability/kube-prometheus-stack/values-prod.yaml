# ============================================================
# kube-prometheus-stack — PROD overrides
# Lean resource requests (matches local sizing — t3.small nodes,
# tight headroom) but real retention/storage since this data
# actually matters for incident debugging.
# ============================================================
prometheus:
  prometheusSpec:
    replicas: 1
    retention: 15d
    resources:
      requests:
        cpu: 100m
        memory: 400Mi
      limits:
        cpu: 500m
        memory: 800Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
alertmanager:
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
grafana:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    storageClassName: gp3
    size: 2Gi
  admin:
    existingSecret: grafana-secrets
    userKey: admin-user
    passwordKey: admin-password
  service:
    type: ClusterIP
