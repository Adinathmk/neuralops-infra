# ============================================================
# kube-prometheus-stack — LOCAL overrides
# Chart defaults assume real infra (multi-replica, large storage,
# generous resource requests). This file scales everything down to
# fit a 3-node kind cluster without changing WHAT gets deployed —
# prod uses the same chart with values-prod.yaml instead, bigger
# numbers only.
# ============================================================

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 6h
    resources:
      requests:
        cpu: 100m
        memory: 400Mi
      limits:
        cpu: 500m
        memory: 800Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

grafana:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    size: 1Gi
  adminPassword: "local-dev-admin"
  service:
    type: ClusterIP