apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: neuralops-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Adinathmk/neuralops-infra.git
    targetRevision: main
    path: gitops/overlays/prod
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
