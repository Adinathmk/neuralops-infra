apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: neuralops-local
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Adinathmk/neuralops-infra.git
    targetRevision: main
    path: gitops/overlays/local

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
