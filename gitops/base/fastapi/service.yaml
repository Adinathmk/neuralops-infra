apiVersion: v1
kind: Service
metadata:
  name: fastapi
  namespace: app
  labels:
    app: fastapi
spec:
  selector:
    app: fastapi
  ports:
    - name: http
      port: 8001
      targetPort: 8001
---
# Non-secret env vars only — confirmed field-by-field against
# app/core/config.py Settings(BaseSettings). Required fields with no
# default (DATABASE_URL, JWT_PUBLIC_KEY) are set per-overlay since their
# values differ between local and prod. Do NOT add secrets here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
  namespace: app
data:
  APP_ENV: "production" # overridden to "development" in local overlay
  APP_NAME: "neuralops-fastapi"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  JWT_ALGORITHM: "RS256"
  TENANT_SUSPENSION_REDIS_PREFIX: "tenant"
  TENANT_SUSPENSION_REDIS_SUFFIX: "suspended"
  CORS_ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
  KAFKA_CONFIG_GROUP_ID: "fastapi-config-sync-group"
  AWS_REGION_NAME: "ap-south-1"
  AWS_S3_BUCKET_NAME: "neuralops-artifacts"
  AWS_S3_SIGNED_URL_EXPIRY: "900"
  EMBEDDING_MODEL: "models/gemini-embedding-2"
  EMBEDDING_DIMENSIONS: "768"
  PLAYBOOK_MATCH_TOP_K: "5"
  PLAYBOOK_MATCH_SCORE_THRESHOLD: "0.28"
  PLAYBOOK_HNSW_EF_SEARCH: "100"
  ELASTICSEARCH_USERNAME: "elastic"
  LANGCHAIN_TRACING_V2: "false"
  LANGCHAIN_PROJECT: "neuralops"
  # Endpoint-shaped values that DIFFER per environment — set in overlays:
  #   DATABASE_URL, REDIS_URL, CELERY_BROKER_URL, CELERY_RESULT_BACKEND,
  #   KAFKA_BOOTSTRAP_SERVERS, ELASTICSEARCH_HOSTS, AWS_S3_ENDPOINT_URL
  # Secrets (JWT_PUBLIC_KEY, GITHUB_APP_PRIVATE_KEY, GEMINI_API_KEY,
  # ELASTICSEARCH_PASSWORD, AWS keys) live in fastapi-secrets.
