apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-exporter-django
  namespace: app
  labels:
    app: celery-exporter-django
    tier: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-exporter-django
  template:
    metadata:
      labels:
        app: celery-exporter-django
    spec:
      containers:
        - name: celery-exporter
          image: danihodovic/celery-exporter:latest
          args:
            - "--broker-url=$(CE_BROKER_URL)"
          env:
            - name: CE_BROKER_URL
              value: "PLACEHOLDER_SET_PER_OVERLAY"
          ports:
            - containerPort: 9808
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: celery-exporter-django
  namespace: app
  labels:
    app: celery-exporter-django
spec:
  selector:
    app: celery-exporter-django
  ports:
    - name: http
      port: 9808
      targetPort: 9808
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: celery-exporter-django
  namespace: app
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: celery-exporter-django
  namespaceSelector:
    matchNames:
      - app
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
