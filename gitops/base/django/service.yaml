apiVersion: v1
kind: Service
metadata:
  name: django
  namespace: app
  labels:
    app: django
spec:
  selector:
    app: django
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
# Non-secret env vars only — confirmed against config/settings.py.
# Secrets (SECRET_KEY, JWT keys, DB creds, Fernet key, OAuth secrets, AWS
# keys, Razorpay keys, GitHub App key) live in django-secrets, sourced
# differently per overlay (plain Secret locally, ExternalSecret in prod).
apiVersion: v1
kind: ConfigMap
metadata:
  name: django-config
  namespace: app
data:
  DEBUG: "False"
  ALLOWED_HOSTS: "*" # tightened per-overlay
  DJANGO_LOG_LEVEL: "INFO"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
  FRONTEND_URL: "http://localhost:3000"
  FRONTEND_OAUTH_SUCCESS_URL: "http://localhost:3000/dashboard"
  FRONTEND_OAUTH_ERROR_URL: "http://localhost:3000/login"
  JWT_ALGORITHM: "RS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  KAFKA_INDEXING_STATUS_TOPIC: "indexing.status"
  KAFKA_INDEXING_STATUS_GROUP_ID: "django-indexing-status-consumer"
  AWS_REGION_NAME: "ap-south-1"
  AWS_S3_BUCKET_NAME: "neuralops-artifacts"
  AWS_S3_SIGNED_URL_EXPIRY: "900"
  ELASTICSEARCH_INDEX_LOGS: "logs"
  DYNAMODB_REGION: "ap-south-1"
  SQS_REGION: "ap-south-1"
  VAPID_SUBJECT: "mailto:admin@neuralops.com"
  # The following are endpoint-shaped values that DIFFER per environment
  # (local Service DNS names vs AWS endpoints) — set in overlays, not here:
  #   DATABASE_URL, DATABASE_REPLICA_URL, REDIS_URL, KAFKA_BOOTSTRAP_SERVERS,
  #   SCHEMA_REGISTRY_URL, ELASTICSEARCH_URL, EMAIL_HOST
