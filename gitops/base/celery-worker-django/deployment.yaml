# Command confirmed from docker-compose.yml celery-worker service:
#   celery -A config worker -c 1 --loglevel=${CELERY_LOG_LEVEL:-info}
# Broker: Redis db 0 (django-config CELERY_BROKER_URL, set per-overlay).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-django
  namespace: app
  labels:
    app: celery-worker-django
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker-django
  template:
    metadata:
      labels:
        app: celery-worker-django
    spec:
      containers:
        - name: celery-worker-django
          image: PLACEHOLDER_ECR_REPO/neuralops-django-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["celery"]
          args: ["-A", "config", "worker", "-c", "1", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: django-config
            - secretRef:
                name: django-secrets
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
