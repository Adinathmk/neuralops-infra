apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: django-secrets
  namespace: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: local-secret-store
    kind: SecretStore
  target:
    name: django-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef: { key: django-secrets-source, property: SECRET_KEY }
    - secretKey: DATABASE_URL
      remoteRef: { key: django-secrets-source, property: DATABASE_URL }
    - secretKey: DATABASE_REPLICA_URL
      remoteRef: { key: django-secrets-source, property: DATABASE_REPLICA_URL }
    - secretKey: REDIS_URL
      remoteRef: { key: django-secrets-source, property: REDIS_URL }
    - secretKey: JWT_PRIVATE_KEY
      remoteRef: { key: django-secrets-source, property: JWT_PRIVATE_KEY }
    - secretKey: JWT_PUBLIC_KEY
      remoteRef: { key: django-secrets-source, property: JWT_PUBLIC_KEY }
    - secretKey: FERNET_ENCRYPTION_KEY
      remoteRef: { key: django-secrets-source, property: FERNET_ENCRYPTION_KEY }
    - secretKey: EMAIL_HOST_USER
      remoteRef: { key: django-secrets-source, property: EMAIL_HOST_USER }
    - secretKey: EMAIL_HOST_PASSWORD
      remoteRef: { key: django-secrets-source, property: EMAIL_HOST_PASSWORD }
    - secretKey: GOOGLE_OAUTH_CLIENT_ID
      remoteRef: { key: django-secrets-source, property: GOOGLE_OAUTH_CLIENT_ID }
    - secretKey: GOOGLE_OAUTH_CLIENT_SECRET
      remoteRef: { key: django-secrets-source, property: GOOGLE_OAUTH_CLIENT_SECRET }
    - secretKey: GITHUB_OAUTH_CLIENT_ID
      remoteRef: { key: django-secrets-source, property: GITHUB_OAUTH_CLIENT_ID }
    - secretKey: GITHUB_OAUTH_CLIENT_SECRET
      remoteRef: { key: django-secrets-source, property: GITHUB_OAUTH_CLIENT_SECRET }
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: django-secrets-source, property: AWS_ACCESS_KEY_ID }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: django-secrets-source, property: AWS_SECRET_ACCESS_KEY }
    - secretKey: DYNAMODB_ACCESS_KEY_ID
      remoteRef: { key: django-secrets-source, property: DYNAMODB_ACCESS_KEY_ID }
    - secretKey: DYNAMODB_SECRET_ACCESS_KEY
      remoteRef: { key: django-secrets-source, property: DYNAMODB_SECRET_ACCESS_KEY }
    - secretKey: SQS_PUSH_INCIDENTS_QUEUE_URL
      remoteRef: { key: django-secrets-source, property: SQS_PUSH_INCIDENTS_QUEUE_URL }
    - secretKey: SQS_PUSH_DISPATCH_QUEUE_URL
      remoteRef: { key: django-secrets-source, property: SQS_PUSH_DISPATCH_QUEUE_URL }
    - secretKey: VAPID_PRIVATE_KEY
      remoteRef: { key: django-secrets-source, property: VAPID_PRIVATE_KEY }
    - secretKey: RAZORPAY_KEY_ID
      remoteRef: { key: django-secrets-source, property: RAZORPAY_KEY_ID }
    - secretKey: RAZORPAY_KEY_SECRET
      remoteRef: { key: django-secrets-source, property: RAZORPAY_KEY_SECRET }
    - secretKey: RAZORPAY_WEBHOOK_SECRET
      remoteRef: { key: django-secrets-source, property: RAZORPAY_WEBHOOK_SECRET }
    - secretKey: GITHUB_APP_ID
      remoteRef: { key: django-secrets-source, property: GITHUB_APP_ID }
    - secretKey: GITHUB_APP_PRIVATE_KEY
      remoteRef: { key: django-secrets-source, property: GITHUB_APP_PRIVATE_KEY }
    - secretKey: GITHUB_WEBHOOK_SECRET
      remoteRef: { key: django-secrets-source, property: GITHUB_WEBHOOK_SECRET }
    - secretKey: KAFKA_BOOTSTRAP_SERVERS
      remoteRef: { key: django-secrets-source, property: KAFKA_BOOTSTRAP_SERVERS }
    - secretKey: SCHEMA_REGISTRY_URL
      remoteRef: { key: django-secrets-source, property: SCHEMA_REGISTRY_URL }
    - secretKey: ELASTICSEARCH_URL
      remoteRef: { key: django-secrets-source, property: ELASTICSEARCH_URL }
    - secretKey: SENTRY_DSN
      remoteRef: { key: django-secrets-source, property: SENTRY_DSN }
