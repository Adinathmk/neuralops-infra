# Local stand-in for ALB — routes everything to Kong, which then applies
# its own path-based routing/JWT/rate-limiting per kong.yml. In prod,
# this is replaced by an ALB Ingress (AWS Load Balancer Controller
# annotations) in overlays/prod, same destination (Kong Service),
# different ingress class/annotations.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neuralops-ingress
  namespace: app
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong
                port:
                  number: 80
