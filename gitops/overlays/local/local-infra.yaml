# ============================================================
# LOCAL-ONLY infra stand-ins for kind testing.
# Images match docker-compose.yml exactly. No persistent volumes
# (emptyDir) — data is disposable on pod restart, which is fine for
# local dev/test but would NEVER be acceptable in prod (prod uses
# RDS/ElastiCache/Strimzi/ECK with real PVCs/managed storage instead).
# ============================================================

# ── Postgres (Django DB) ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-db
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: django-db }
  template:
    metadata:
      labels: { app: django-db }
    spec:
      enableServiceLinks: false
      containers:
        - name: django-db
          image: pgvector/pgvector:pg16
          args:
            - -c
            - wal_level=logical
            - -c
            - max_replication_slots=10
            - -c
            - max_wal_senders=10
          env:
            - { name: POSTGRES_DB, value: "django_db" }
            - { name: POSTGRES_USER, value: "neuralops" }
            - { name: POSTGRES_PASSWORD, value: "neuralops_password" }
          ports:
            - containerPort: 5432
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "neuralops", "-d", "django_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: django-db
  namespace: data
spec:
  selector: { app: django-db }
  ports: [{ port: 5432, targetPort: 5432 }]

---
# ── Postgres (FastAPI DB) ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-db
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: fastapi-db }
  template:
    metadata:
      labels: { app: fastapi-db }
    spec:
      containers:
        - name: fastapi-db
          image: pgvector/pgvector:pg16
          args:
            - -c
            - wal_level=logical
            - -c
            - max_replication_slots=10
            - -c
            - max_wal_senders=10
          env:
            - { name: POSTGRES_DB, value: "neuralops_fastapi_db" }
            - { name: POSTGRES_USER, value: "neuralops_fastapi" }
            - { name: POSTGRES_PASSWORD, value: "fastapi_password" }
          ports:
            - containerPort: 5432
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec:
              command:
                ["pg_isready", "-U", "neuralops_fastapi", "-d", "neuralops_fastapi_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-db
  namespace: data
spec:
  selector: { app: fastapi-db }
  ports: [{ port: 5432, targetPort: 5432 }]

---
# ── Redis ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: data
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]

---

# ── MinIO (Local S3 Mock Object Storage) ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-01-28T22-35-53Z
          env:
            - { name: MINIO_ROOT_USER, value: "minioadmin" }
            - { name: MINIO_ROOT_PASSWORD, value: "minioadminpassword" }
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: data
spec:
  selector: { app: minio }
  ports: 
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }

---
# -- Debezium Connect ---------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: debezium }
  template:
    metadata:
      labels: { app: debezium }
    spec:
      enableServiceLinks: false
      containers:
        - name: debezium
          image: debezium/connect:2.7.0.Final
          env:
            - { name: KAFKA_HEAP_OPTS, value: "-Xms256m -Xmx512m" }
            - { name: BOOTSTRAP_SERVERS, value: "kafka-kafka-bootstrap.data.svc.cluster.local:9092" }
            - { name: GROUP_ID, value: "debezium-django-db1" }
            - { name: CONFIG_STORAGE_TOPIC, value: "debezium_configs" }
            - { name: OFFSET_STORAGE_TOPIC, value: "debezium_offsets" }
            - { name: STATUS_STORAGE_TOPIC, value: "debezium_status" }
            - { name: CONFIG_STORAGE_REPLICATION_FACTOR, value: "1" }
            - { name: OFFSET_STORAGE_REPLICATION_FACTOR, value: "1" }
            - { name: STATUS_STORAGE_REPLICATION_FACTOR, value: "1" }
          ports:
            - containerPort: 8083
              name: api
---
apiVersion: v1
kind: Service
metadata:
  name: debezium
  namespace: data
spec:
  ports:
    - { port: 8083, targetPort: api, name: api }
  selector: { app: debezium }

