# ============================================================
# LOCAL-ONLY infra stand-ins for kind testing.
# Images match docker-compose.yml exactly. No persistent volumes
# (emptyDir) — data is disposable on pod restart, which is fine for
# local dev/test but would NEVER be acceptable in prod (prod uses
# RDS/ElastiCache/Strimzi/ECK with real PVCs/managed storage instead).
# ============================================================

# ── Postgres (Django DB) ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-db
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: django-db }
  template:
    metadata:
      labels: { app: django-db }
    spec:
      enableServiceLinks: false
      containers:
        - name: django-db
          image: pgvector/pgvector:pg16
          args:
            - -c
            - wal_level=logical
            - -c
            - max_replication_slots=10
            - -c
            - max_wal_senders=10
          env:
            - { name: POSTGRES_DB, value: "django_db" }
            - { name: POSTGRES_USER, value: "neuralops" }
            - { name: POSTGRES_PASSWORD, value: "neuralops_password" }
          ports:
            - containerPort: 5432
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "neuralops", "-d", "django_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
      initContainers:
        - name: init-publication
          image: pgvector/pgvector:pg16
          env:
            - { name: PGPASSWORD, value: "neuralops_password" }
          command:
            - sh
            - -c
            - |
              until pg_isready -h 127.0.0.1 -U neuralops -d django_db; do sleep 1; done
              psql -h 127.0.0.1 -U neuralops -d django_db -c \
                "CREATE PUBLICATION debezium_django_publication FOR TABLE public.outbox" \
                || echo "Publication already exists, skipping."
---
apiVersion: v1
kind: Service
metadata:
  name: django-db
  namespace: data
spec:
  selector: { app: django-db }
  ports: [{ port: 5432, targetPort: 5432 }]

---
# ── Postgres (FastAPI DB) ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-db
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: fastapi-db }
  template:
    metadata:
      labels: { app: fastapi-db }
    spec:
      containers:
        - name: fastapi-db
          image: pgvector/pgvector:pg16
          args:
            - -c
            - wal_level=logical
            - -c
            - max_replication_slots=10
            - -c
            - max_wal_senders=10
          env:
            - { name: POSTGRES_DB, value: "neuralops_fastapi_db" }
            - { name: POSTGRES_USER, value: "neuralops_fastapi" }
            - { name: POSTGRES_PASSWORD, value: "fastapi_password" }
          ports:
            - containerPort: 5432
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec:
              command:
                ["pg_isready", "-U", "neuralops_fastapi", "-d", "neuralops_fastapi_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-db
  namespace: data
spec:
  selector: { app: fastapi-db }
  ports: [{ port: 5432, targetPort: 5432 }]

---
# ── Redis ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: data
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]

---
# ── Kafka (single-broker, KRaft mode — same image as docker-compose.yml) ─────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.7.0
          imagePullPolicy: IfNotPresent
          env:
            - { name: CLUSTER_ID, value: "RdEoWBwUQyuyHQvv8SfHSA" }
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka.data.svc.cluster.local:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
            - { name: KAFKA_LOG_DIRS, value: "/var/lib/kafka/data" }
          ports:
            - containerPort: 9092
            - containerPort: 9093
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data

      volumes:
        - name: kafka-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: data
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092

---
# ── Elasticsearch (single-node) ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: elasticsearch }
  template:
    metadata:
      labels: { app: elasticsearch }
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          ports:
            - containerPort: 9200
          readinessProbe:
            httpGet: { path: /, port: 9200 }
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: data
spec:
  selector: { app: elasticsearch }
  ports: [{ port: 9200, targetPort: 9200 }]

---
# ── MinIO (Local S3 Mock Object Storage) ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-01-28T22-35-53Z
          env:
            - { name: MINIO_ROOT_USER, value: "minioadmin" }
            - { name: MINIO_ROOT_PASSWORD, value: "minioadminpassword" }
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: data
spec:
  selector: { app: minio }
  ports: 
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }

---
# -- Debezium Connect ---------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: debezium }
  template:
    metadata:
      labels: { app: debezium }
    spec:
      enableServiceLinks: false
      containers:
        - name: debezium
          image: debezium/connect:2.7.0.Final
          env:
            - { name: KAFKA_HEAP_OPTS, value: "-Xms256m -Xmx512m" }
            - { name: BOOTSTRAP_SERVERS, value: "kafka.data.svc.cluster.local:9092" }
            - { name: GROUP_ID, value: "debezium-django-db1" }
            - { name: CONFIG_STORAGE_TOPIC, value: "debezium_configs" }
            - { name: OFFSET_STORAGE_TOPIC, value: "debezium_offsets" }
            - { name: STATUS_STORAGE_TOPIC, value: "debezium_status" }
            - { name: CONFIG_STORAGE_REPLICATION_FACTOR, value: "1" }
            - { name: OFFSET_STORAGE_REPLICATION_FACTOR, value: "1" }
            - { name: STATUS_STORAGE_REPLICATION_FACTOR, value: "1" }
          ports:
            - containerPort: 8083
              name: api
---
apiVersion: v1
kind: Service
metadata:
  name: debezium
  namespace: data
spec:
  ports:
    - { port: 8083, targetPort: api, name: api }
  selector: { app: debezium }

