# Strategic-merge patch: ADD keys to the base fastapi-config ConfigMap
# that differ between local/prod. DATABASE_URL, REDIS_URL,
# CELERY_BROKER_URL, CELERY_RESULT_BACKEND, KAFKA_BOOTSTRAP_SERVERS,
# and ELASTICSEARCH_HOSTS are intentionally NOT here — they live in
# the fastapi-secrets Secret (sourced from AWS Secrets Manager) to
# avoid duplicate-source-of-truth bugs. AWS_S3_ENDPOINT_URL (MinIO)
# removed — prod uses real S3 directly.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
  namespace: app
data:
  APP_ENV: "production"
  DEBUG: "false"
  ELASTICSEARCH_CA_CERT_PATH: "/etc/ssl/es/es-ca.crt"
  CORS_ALLOWED_ORIGINS: 'https://adinath.site'
