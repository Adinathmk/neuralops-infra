apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fastapi-secrets
  namespace: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: fastapi-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: neuralops/fastapi

